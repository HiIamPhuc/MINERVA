# Config for GWM with precomputed text embeddings
text_embedding_dim: 768
num_layers: 2
hidden_dim: 1024
structural_dim: 384
fusion_mode: gated
dropout: 0.2
learning_rate: 1e-4
batch_size: 1024
loss: infonce
num_epochs: 200
temperature: 0.07

data_dir: data-processed/WN18RR
output_dir: output/gwm
    
add_inverse: true
early_stopping: 5
eval_every: 1
    
device: cuda
seed: 42

text_cache_device: cpu

eval_batch_size: 1024
candidate_batch_size: 1024